# Render Blueprint — backend (FastAPI) web service.
# Render dashboard'da "New > Blueprint" ile bu repoyu seçince otomatik okunur.
# Gizli anahtarlar (sync: false) deploy sonrası dashboard'dan girilir.
services:
  - type: web
    name: smart-restaurant-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.6"
      # JWT imzalama anahtarı — Render güçlü rastgele bir değer üretir.
      - key: JWT_SECRET
        generateValue: true
      # Aşağıdakiler dashboard'dan elle girilir (gizli/ortama özel):
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      # Neon Postgres bağlantısı: postgresql://...@host/db?sslmode=require
      - key: DATABASE_URL
        sync: false
      # Vercel frontend origin'i, örn: https://smart-restaurant-finder.vercel.app
      - key: CORS_ORIGINS
        sync: false
